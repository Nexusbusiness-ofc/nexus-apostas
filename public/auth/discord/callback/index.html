<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <title>Nexus Apostas | Autenticação...</title>
  <style>
    body {
      background: #0f0f15;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .loader {
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-left-color: #e60000;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .container {
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="loader" style="margin: 0 auto 20px;"></div>
    <h2>A processar autenticação com o Discord...</h2>
    <p>Por favor, aguarda...</p>
  </div>

  <script>
    async function handleCallback() {
      const hash = window.location.hash;
      if (hash && hash.includes('access_token=')) {
        const params = new URLSearchParams(hash.substring(1));
        const accessToken = params.get('access_token');
        
        if (accessToken) {
          try {
            const response = await fetch('https://discord.com/api/users/@me', {
              headers: {
                'Authorization': `Bearer ${accessToken}`
              }
            });
            
            if (!response.ok) {
              throw new Error('Falha ao obter perfil do Discord');
            }
            
            const userData = await response.json();
            
            const discordId = userData.id;
            const username = userData.global_name || userData.username;
            const avatar = userData.avatar 
              ? `https://cdn.discordapp.com/avatars/${discordId}/${userData.avatar}.png`
              : `https://cdn.discordapp.com/embed/avatars/${parseInt(userData.discriminator || '0') % 5}.png`;

            let localUser = JSON.parse(localStorage.getItem('nexus_user'));
            if (!localUser || localUser.discord_id !== discordId) {
              localUser = {
                id: 'local_' + discordId,
                discord_id: discordId,
                username,
                avatar,
                balance: 0,
                xp: 0,
                level: 1,
                roles: [],
                coupons: [],
                wins: 0,
                losses: 0,
                last_daily_claim: null,
                last_sync: null
              };
              localStorage.setItem('nexus_user', JSON.stringify(localUser));
              
              // Log transaction
              let localTxs = JSON.parse(localStorage.getItem('nexus_transactions') || '[]');
              localTxs.unshift({
                id: localTxs.length + 1,
                user_id: localUser.id,
                type: 'initial_balance',
                amount: 0,
                description: 'Saldo inicial de Euros',
                timestamp: new Date().toISOString()
              });
              localStorage.setItem('nexus_transactions', JSON.stringify(localTxs));
            } else {
              localUser.username = username;
              localUser.avatar = avatar;
              localStorage.setItem('nexus_user', JSON.stringify(localUser));
            }
          } catch (err) {
            console.error('Erro no callback do Discord:', err);
          }
        }
      }
      
      // Redirect back to main page (remove subdirectories)
      const pathParts = window.location.pathname.split('/');
      const projectIndex = pathParts.indexOf('nexus-apostas');
      let redirectUrl = window.location.origin;
      if (projectIndex !== -1) {
        redirectUrl += pathParts.slice(0, projectIndex + 1).join('/') + '/';
      } else {
        redirectUrl += '/';
      }
      window.location.href = redirectUrl;
    }

    handleCallback();
  </script>
</body>
</html>
